name                   = "stark-fellowship"
pages_build_output_dir = "."
compatibility_date     = "2024-09-23"

# ── KV namespace: stores all waitlist + volunteer data ────────────────────────
# Setup steps:
#   1. Run:  npx wrangler kv namespace create "STARK_DATA"
#   2. Copy the id printed and paste below.
#   3. Run:  npx wrangler kv namespace create "STARK_DATA" --preview
#   4. Copy the preview_id and paste below.
#
# Then in Cloudflare Pages dashboard:
#   Settings → Functions → KV namespace bindings
#   Add: Variable name = STARK_DATA, KV namespace = (select the one you created)
#
# Also add Environment variable:
#   STARK_ADMIN_KEY = (choose any strong password for /admin access)

[[kv_namespaces]]
binding    = "STARK_DATA"
id         = "635e030e8b764a549fc53ce7649593d5"
preview_id = "e377b42b393e479a92a4b3216d85588e"
